<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Memories</p>
</div>

<div id="chat"></div>

<script>
fetch('message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');

    const chat = document.getElementById('chat');

    messages.forEach(msg => {

      const senderEl = msg.querySelector('h2');
      const textEl = msg.querySelector('div._3-95._a6-p div div:nth-child(2)');
      const timeEl = msg.querySelector('div._3-94._a6-o');

      if (!senderEl || !timeEl) return;

      const sender = senderEl.innerText.trim();
      const text = textEl ? textEl.innerText.trim() : '';
      const time = timeEl.innerText.trim();

      const bubble = document.createElement('div');

      bubble.className =
        sender === 'Rylen'
        ? 'message you'
        : 'message her';

      bubble.innerHTML = `
        <div class="name">${sender}</div>
        <div class="bubble">${text}</div>
        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);

    });

  });
</script>

</body>
</html>
