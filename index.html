<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');
    const chat = document.getElementById('chat');

    let lastMessageEl = null;

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();

      if (!sender || !time) return;

      // clone text block so we can safely remove junk
      const textBlock = msg.querySelector('div._a6-p');
      let text = '';

      if (textBlock) {
        const clone = textBlock.cloneNode(true);

        // remove sender name if it leaks inside text
        clone.querySelectorAll('h2').forEach(e => e.remove());

        text = clone.innerText.trim();
      }

      const isEdited = text.includes('(edited)');
      if (isEdited) {
        text = text.replace('(edited)', '').trim();
      }

      const isLiked = text.toLowerCase().includes('liked a message');

      // FIX 1: liked messages become separate UI element ONLY
      if (isLiked) {
        if (lastMessageEl) {
          const like = document.createElement('div');
          like.className = 'like-below';
          like.innerText = '❤ liked';
          lastMessageEl.appendChild(like);
        }
        return; // IMPORTANT: do not render a normal bubble
      }

      // build message bubble
      const bubble = document.createElement('div');
      bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

      bubble.innerHTML = `
        <div class="name">${sender}</div>
        <div class="bubble">${text}</div>
        ${isEdited ? `<div class="meta">edited</div>` : ''}
        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);

      // track last real message
      lastMessageEl = bubble;

    });

  });
</script>
</body>
</html>
