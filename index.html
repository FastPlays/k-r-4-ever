<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rylen ❤️ Khloe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top">
  <h1>Rylen ❤️ Khloe</h1>
  <p>Instagram Chat Memories</p>
</div>
  
<div id="chat"></div>

<script>
fetch('./message1.html')
  .then(res => res.text())
  .then(html => {

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const messages = doc.querySelectorAll('div.pam');
    const chat = document.getElementById('chat');

    const seen = new Map();

    function cleanText(text = "") {
      return text
        .replace("❤Khloe", "")
        .replace("❤Rylen", "")
        .replace("(edited)", "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isSystemMessage(text = "") {
      const t = text.toLowerCase();
      return (
        t.includes("liked a message") ||
        t.includes("reacted") ||
        t.includes("reacted ❤️")
      );
    }

    messages.forEach(msg => {

      const sender = msg.querySelector('h2')?.innerText?.trim();
      const time = msg.querySelector('div._3-94._a6-o')?.innerText?.trim();
      const textBlock = msg.querySelector('div._a6-p');

      if (!sender || !time) return;

      let rawText = textBlock ? textBlock.innerText.trim() : "";

      // ignore system messages completely
      if (isSystemMessage(rawText)) return;

      const isEdited = rawText.includes("(edited)");

      const text = cleanText(rawText);

      const key = sender + "|" + time;

      // IMPORTANT FIX:
      // always overwrite older versions (removes pre-edit duplicates)
      const existing = seen.get(key);

      if (!existing || isEdited) {
        seen.set(key, { sender, time, text, isEdited });
      }
    });

    seen.forEach(({ sender, time, text, isEdited }) => {

      const bubble = document.createElement('div');
      bubble.className = sender === 'Rylen' ? 'message you' : 'message her';

      // FIX: restore pink liked tag properly
      let meta = "";
      if (isEdited) {
        meta += `<span class="edited">edited</span>`;
      }

      // detect "liked message" type and show tag instead of removing fully
      const isLiked = false; // Instagram export doesn't always mark cleanly

      if (isLiked) {
        meta += `<span class="liked">💗 liked</span>`;
      }

      bubble.innerHTML = `
        <div class="name">${sender}</div>
        ${text ? `<div class="bubble">${text}</div>` : ''}
        ${meta ? `<div class="meta">${meta}</div>` : ''}
        <div class="time">${time}</div>
      `;

      chat.appendChild(bubble);
    });

  });
</script>
</body>
</html>
